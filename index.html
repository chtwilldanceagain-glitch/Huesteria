function layerBoundsCenterPivot(item, ratioY){

function upperBodyAutoPivot(){

}

function applyUpperBodyFollowTransforms(){
  const cfg=getCaptureFaceConfig();
  const ub=getUpperBodyFollowState();
  if(!cfg.bodyFollowEnabled && !ub.active) return;
  if(Math.abs(ub.x)+Math.abs(ub.y)+Math.abs(ub.rot)<0.0001) return;
  const pivot=upperBodyPivot();
  const c=Math.cos(ub.rot), s=Math.sin(ub.rot);
  for(const item of state.items.values()){
    const d=item&&item.mesh;
    if(!d||!d.position) continue;
    const x=Number(d.position.x||0), y=Number(d.position.y||0);
    const dx=x-pivot.x, dy=y-pivot.y;
    d.position.set(pivot.x+dx*c-dy*s+ub.x,pivot.y+dx*s+dy*c+ub.y);

function poseTargetFromRaw(raw,cfg){

  target.rightShoulderVisible=!!(raw&&raw.right&&raw.right.ok);
  if(!raw||!raw.left||!raw.right||!raw.left.ok||!raw.right.ok) return target;
  const base=rt.poseBaseline||{};
  const sens=clamp(cfg.armSens,0,3,2.2);
  const currentTilt=shoulderTiltRatio(raw);

    const mirrorSign=cfg.mirror?-1:1;
    target.bodyX=clamp((center.x-baseCenter.x)*220*move*mirrorSign,-80,80,0);
    target.bodyY=clamp((center.y-baseCenter.y)*180*move,-80,80,0);
    target.bodyRot=clamp((currentTilt-baseTilt)*roll*mirrorSign,-BEGA_BODY_ROT_LIMIT,BEGA_BODY_ROT_LIMIT,0);
    target.centerX=Number(center.x||0); target.centerY=Number(center.y||0);
    target.baseCenterX=Number(baseCenter.x||0); target.baseCenterY=Number(baseCenter.y||0);

  function renderPhysicsMenu(){ const st=getPhysicsStabilize(); const physicsOn=!!(state.pkg&&state.pkg.physics&&state.pkg.physics.enabled); const rt=state.runtime.physicsRuntime||{}; const activeChains=PHYSICS_CHAIN_IDS.filter((id)=>Math.abs(Number(rt.chains&&rt.chains[id]&&rt.chains[id].output||0))>0.001).length; return `<div class="card"><h2 class="title">물리</h2><p class="text">SIRIOUS에서 저장한 체인값을 그대로 쓰고, BEGA에서는 ON/OFF와 안정화만 조절합니다.</p><div class="row">${createActionButton(physicsOn?'물리 ON':'물리 OFF','togglePhysics',physicsOn)}</div><div class="mono ${physicsOn?'ok':'bad'}">physics: ${physicsOn?'on':'off'}

  function renderOutputMenu(){ const b=getBroadcastConfig(); const layoutOn=isBroadcastLayoutActive(); const presetLabel=getBroadcastPresetLabel(); const bgButtons=BROADCAST_BACKGROUNDS.map((bg)=>createActionButton(broadcastBackgroundLabel(bg),'broadcastBg:'+bg,b.background===bg)).join(''); const presetButtons=Object.entries(BROADCAST_PRESETS).map(([id,p])=>createActionButton(p.label,'broadcastPreset:'+id,b.width===p.width&&b.height===p.height&&b.anchorX===p.anchorX&&b.anchorY===p.anchorY&&b.avatarHeight===p.avatarHeight)).join(''); return `<div class="card broadcastHint"><h2 class="title">송출</h2><p class="text">캐릭터 내부 런타임과 별개인 최종 배치층입니다. 노란 점선은 현재 프리셋의 실제 송출 영역이고, 우하단 점이 캐릭터 anchor입니다.</p><div class="mono ok">현재 프리셋: ${escapeHtml(presetLabel)}</div><div class="row">${presetButtons}</div></div><div class="card"><h3 class="title">송출 좌표</h3>${createBroadcastNumber('화면 W','width',320,7680,1)}${createBroadcastNumber('화면 H','height',240,4320,1)}${createBroadcastNumber('기준 X','anchorX',-7680,15360,1)}${createBroadcastNumber('기준 Y','anchorY',-4320,8640,1)}${createBroadcastNumber('캐릭터 높이','avatarHeight',16,4320,1)}<div class="mono ${layoutOn?'ok':'bad'}">anchor: 캐릭터 고정 박스의 우측 하단

  function bindPanelControls(){ $('panel').querySelectorAll('input[data-key]').forEach((el)=>{ el.addEventListener('input',()=>{ const key=el.dataset.key; const min=Number(el.dataset.min??-1); const max=Number(el.dataset.max??1); state.runtime[key]=clamp(el.value,min,max,0); if(key==='armLeftManual'||key==='armRightManual'){ syncEffectiveArmAngles(); queueArmDrivenApply(); } $('panel').querySelectorAll(`input[data-key="${key}"]`).forEach((other)=>{ if(other!==el) other.value=el.type==='range'?fmt(state.runtime[key],2):state.runtime[key]; }); applyPose(); startRuntimeLoop(); }); }); $('panel').querySelectorAll('input[data-phys-key]').forEach((el)=>{ el.addEventListener('input',()=>{ const key=el.dataset.physKey; const min=Number(el.dataset.min??0); const max=Number(el.dataset.max??1); const st=getPhysicsStabilize(); st[key]=clamp(el.value,min,max,0); $('panel').querySelectorAll(`input[data-phys-key="${key}"]`).forEach((other)=>{ if(other!==el) other.value=key==='warmupMs'?fmt(st[key],0):fmt(st[key],3); }); resetPhysicsRuntime({keepWarmup:true,lastAt:performance.now()}); applyPose(); startRuntimeLoop(); }); }); $('panel').querySelectorAll('input[data-cap-key]').forEach((el)=>{ el.addEventListener('input',()=>{ const key=el.dataset.capKey; const min=Number(el.getAttribute('min')??el.dataset.min??0); const max=Number(el.getAttribute('max')??el.dataset.max??3); const cfg=getCaptureFaceConfig(); cfg[key]=clamp(el.value,min,max,BEGA_DEFAULT_CAPTURE_FACE[key]||0); if(['bodyStability','bodyDeadzone','bodyMaxStep'].includes(key)){ reseedBodyFinalFollowFromCurrent(); startRuntimeLoop(); } if(['armStability','armDeadzone','armMaxStep'].includes(key)){ reseedArmAntiTickFromCurrent(); startRuntimeLoop(); } if(key==='bodyPivotX'||key==='bodyPivotY'){
            if(!cfg.bodyPivotManual){

              if(key==='bodyPivotY' && (!Number.isFinite(Number(cfg.bodyPivotX)) || Number(cfg.bodyPivotX)<=0)) cfg.bodyPivotX=Number(p.x||0);
            }
            cfg.bodyPivotManual=true;
            applyPose();
            updateMocapPivotDot();
            requestAnimationFrame(updateMocapPivotDot);
            startRuntimeLoop();
          } $('panel').querySelectorAll(`input[data-cap-key="${key}"]`).forEach((other)=>{ if(other!==el) other.value=fmt(cfg[key],(key==='bodyPivotX'||key==='bodyPivotY')?0:((key==='deadzone'||key==='headDeadzone'||key==='headMaxStep'||key==='armDeadzone'||key==='armMaxStep'||key==='bodyDeadzone'||key==='bodyMaxStep')?3:2)); }); }); }); $('panel').querySelectorAll('input[data-broadcast-key]').forEach((el)=>{ el.addEventListener('input',()=>{ const key=el.dataset.broadcastKey; const b=getBroadcastConfig(); const min=Number(el.dataset.min??-999999); const max=Number(el.dataset.max??999999); b[key]=Math.round(clamp(el.value,min,max,b[key]||0)); $('panel').querySelectorAll(`input[data-broadcast-key="${key}"]`).forEach((other)=>{ if(other!==el) other.value=fmt(b[key],0); }); if(isBroadcastLayoutActive()) applyBroadcastLayout(); }); }); $('panel').querySelectorAll('select[data-mocap-camera]').forEach((el)=>{ el.addEventListener('change',()=>{ const cfg=getCaptureFaceConfig(); const rt=getMocapRuntime(); cfg.cameraDeviceId=String(el.value||''); rt.selectedDeviceId=cfg.cameraDeviceId; const label=(Array.isArray(rt.devices)?rt.devices:[]).find((d)=>d.deviceId===cfg.cameraDeviceId); setMocapInfo('카메라 선택: '+(label&&label.label?label.label:'기본 카메라')); if(rt.running) startFaceCaptureCamera(); else renderControls(); }); }); $('panel').querySelectorAll('button[data-action]').forEach((btn)=>{ btn.addEventListener('click',()=>{ const action=btn.dataset.action; if(action==='load') $('packageInput').click(); else if(action==='fit'){ const b=getBroadcastConfig(); b.enabled=false; b.preview=false; b.toolsOpen=false; applyCurrentLayout(); renderControls(); } else if(action==='reset') resetPose(); else if(action==='sprite') setRenderMode('sprite'); else if(action==='mesh') setRenderMode('mesh'); else if(action==='togglePhysics'){ normalizePhysicsPackage(state.pkg); state.pkg.physics.enabled=!state.pkg.physics.enabled; resetPhysicsRuntime({lastAt:0}); renderControls(); applyPose(); startRuntimeLoop(); } else if(action==='toggleBlink'){ state.runtime.blinkEnabledOverride=!isBlinkActive(); state.runtime.faceTick.blinkNextAt=0; state.runtime.faceTick.blinking=false; renderControls(); applyPose(); startRuntimeLoop(); } else if(action==='toggleBreath'){ state.runtime.breathEnabledOverride=!isBreathActive(); state.runtime.faceTick.breathStartAt=0; renderControls(); applyPose(); startRuntimeLoop(); } else if(action==='mocapRefreshCameras'){ refreshMocapCameraDevices(); } else if(action==='mocapStart'){ startFaceCaptureCamera(); } else if(action==='mocapStop'){ stopFaceCaptureCamera(); } else if(action==='mocapCalibrate'){ startFaceCaptureCalibration('수동 보정'); startPoseCaptureCalibration('수동 보정'); renderControls(); } else if(action==='mocapMirror'){ const cfg=getCaptureFaceConfig(); cfg.mirror=!cfg.mirror; updateMpPreviewState(getMocapRuntime().ready); renderControls(); } else if(action==='mocapPreview'){ const cfg=getCaptureFaceConfig(); cfg.overlayEnabled=!cfg.overlayEnabled; updateMpPreviewState(getMocapRuntime().ready); renderControls(); } else if(action==='bodyFollowToggle'){ const cfg=getCaptureFaceConfig(); cfg.bodyFollowEnabled=!cfg.bodyFollowEnabled; if(!cfg.bodyFollowEnabled) resetUpperBodyFollow(); else reseedBodyFinalFollowFromCurrent(); applyPose(); renderControls(); } else if(action==='bodyPivotToggle'){ const cfg=getCaptureFaceConfig(); cfg.bodyPivotManual=!cfg.bodyPivotManual; if(cfg.bodyPivotManual){ const p=upperBodyPivot(); if(!Number.isFinite(Number(cfg.bodyPivotX))||!Number.isFinite(Number(cfg.bodyPivotY))||(Number(cfg.bodyPivotX)===0&&Number(cfg.bodyPivotY)===0)){ copyAutoUpperBodyPivotToManual(); } } applyPose(); updateMocapPivotDot(); startRuntimeLoop(); renderControls(); requestAnimationFrame(updateMocapPivotDot); } else if(action==='bodyPivotCopy'){ copyAutoUpperBodyPivotToManual(); applyPose(); updateMocapPivotDot(); startRuntimeLoop(); renderControls(); requestAnimationFrame(updateMocapPivotDot); } else if(action==='mocapArmToggl   function renderControls(){ const pkg=state.pkg; if(!pkg){ const active=activeMenu(); showPanel(`<div class="card"><h2 class="title">BEGA</h2><p class="text">SIRIOUS 출력 탭에서 만든 BEGA ZIP 패키지(.zip)를 불러오세요. 구버전 JSON도 읽을 수 있습니다.</p><div class="row">${createActionButton('패키지 불러오기','load',true)}</div></div>${active==='info'?'<div class="card"><div class="mono">패키지 없음</div></div>':''}`); bindPanelControls(); return; } let html=''; if(activeMenu()==='file') html=renderFileMenu(); else if(activeMenu()==='face') html=renderFaceMenu(); else if(activeMenu()==='physics') html=renderPhysicsMenu(); else if(activeMenu()==='mocap') html=renderMocapMenu(); else if(activeMenu()==='output') html=renderOutputMenu(); else html=renderInfoMenu(); showPanel(html); bindPanelControls(); }
  async function setRenderMode(mode){ if(mode!== 'sprite' && mode!=='mesh') return; if(state.renderMode===mode) return; state.renderMode=mode; if(state.pkg){ await rebuildStage(); renderControls(); applyCurrentLayout(); applyPose(); } updateModeButtons(); }
  function updateModeButtons(){ const sprite=$('modeSpriteBtn'); const mesh=$('modeMeshBtn'); if(sprite) sprite.setAttribute('aria-pressed',state.renderMode==='sprite'?'true':'false'); if(mesh) mesh.setAttribute('aria-pressed',state.renderMode==='mesh'?'true':'false'); const pairs=[['menuFileBtn','file'],['menuFaceBtn','face'],['menuPhysicsBtn','physics'],['menuMocapBtn','mocap'],['menuOutputBtn','output'],['menuInfoBtn','info']]; for(const [id,menu] of pairs){ const btn=$(id); if(btn) btn.setAttribute('aria-pressed',activeMenu()===menu?'true':'false'); } }
  function resetPose(){ state.runtime.headYaw=0; state.runtime.headPitch=0; state.runtime.headRoll=0; state.runtime.gazeX=0; state.runtime.gazeY=0; state.runtime.mouthOpen=0; state.runtime.mouthForm=0; state.runtime.armLeftManual=0; state.runtime.armRightManual=0; state.runtime.armLeftMocap=0; state.runtime.armRightMocap=0; const rt=getMocapRuntime(); rt.target=emptyFaceCaptureTarget(); rt.poseTarget=emptyPoseCaptureTarget(); resetBodyAntiTickRuntime(rt); resetBodyFinalFollowRuntime(rt,{bodyX:0,bodyY:0,bodyRot:0}); resetArmAntiTickRuntime(rt); resetArmAntiTickRuntime(rt); rt.smoothed={headYaw:0,headPitch:0,headRoll:0,gazeX:0,gazeY:0,mouthOpen:0,mouthForm:0}; resetHeadAntiTickRuntime(rt); resetUpperBodyFollow(); syncEffectiveArmAngles(); state.runtime.mouthState='close'; resetPhysicsRuntime({lastAt:0}); renderControls(); applyPose(); startRuntimeLoop(); }
  function setupStageGestures(){ const shell=$('stageShell'); const pointers=new Map(); const locked=()=>getBroadcastConfig().enabled===true; shell.addEventListener('pointerdown',(e)=>{ if(locked()){ pointers.clear(); return; } shell.setPointerCapture(e.pointerId); pointers.set(e.pointerId,{x:e.clientX,y:e.clientY}); }); shell.addEventListener('pointermove',(e)=>{ if(locked()){ pointers.clear(); return; } if(!pointers.has(e.pointerId)||!state.app) return; const prev=pointers.get(e.pointerId); const dx=e.clientX-prev.x; const dy=e.clientY-prev.y; pointers.set(e.pointerId,{x:e.clientX,y:e.clientY}); state.view.x+=dx; state.view.y+=dy; state.app.stage.position.set(state.view.x,state.view.y); updateMocapPivotDot(); }); const end=(e)=>pointers.delete(e.pointerId); shell.addEventListener('pointerup',end); shell.addEventListener('pointercancel',end); shell.addEventListener('wheel',(e)=>{ if(locked()){ e.preventDefault(); return; } e.preventDefault(); if(!state.app) return; const next=clamp(state.view.scale*(e.deltaY<0?1.08:0.92),0.02,10,state.view.scale); state.view.scale=next; state.app.stage.scale.set(next); updateMocapPivotDot(); },{passive:false}); }
  function bind(){ const input=$('packageInput'); $('loadBtn').addEventListener('click',()=>{ input.value=''; input.click(); }); input.addEventListener('change',()=>{ const file=input.files&&input.files[0]; if(!file) return; loadPackage(file).catch((err)=>{ console.error(err); setHud(`ERROR: ${err.message}`); showPanel(`<div class="card"><h2 class="title bad">로드 실패</h2><div class="mono bad">${escapeHtml(err.message||String(err))}</div></div>`); }); }); $('fitBtn').addEventListener('click',()=>{ const b=getBroadcastConfig(); b.enabled=false; b.preview=false; b.toolsOpen=false; applyCurrentLayout(); renderControls(); }); $('modeSpriteBtn').addEventListener('click',()=>setRenderMode('sprite')); $('modeMeshBtn').addEventListener('click',()=>setRenderMode('mesh')); const menus=[['menuFileBtn','file'],['menuFaceBtn','face'],['menuPhysicsBtn','physics'],['menuMocapBtn','mocap'],['menuOutputBtn','output'],['menuInfoBtn','info']]; for(const [id,menu] of menus){ const btn=$(id); if(btn) btn.addEventListener('click',()=>setActiveMenu(menu)); } const exitBtn=$('broadcastExitBtn'); if(exitBtn){ const exit=(e)=>{ e.preventDefault(); e.stopPropagation(); exitBroadcastMode(); }; exitBtn.addEventListener('click',exit); exitBtn.addEventListener('pointerup',exit); } const broadcastToolsBtn=$('broadcastToolsBtn'); if(broadcastToolsBtn){ let lastToolsToggleAt=0; const toggleTools=(e)=>{ e.preventDefault(); e.stopPropagation(); const now=performance.now(); if(now-lastToolsToggleAt<250) return; lastToolsToggleAt=now; toggleBroadcastTools(); }; broadcastToolsBtn.addEventListener('click',toggleTools); broadcastToolsBtn.addEventListener('pointerup',toggleTools); } const broadcastCalibrateBtn=$('broadcastCalibrateBtn'); if(broadcastCalibrateBtn){ broadcastCalibrateBtn.addEventListener('click',(e)=>{ e.preventDefault(); e.stopPropagation(); startFaceCaptureCalibration('송출모드 보정'); startPoseCaptureCalibration('송출모드 보정'); updateMpPreviewState(getMocapRuntime().ready); }); }
    let broadcastHoldTimer=0; let broadcastHoldStart=null;
    const clearBroadcastHold=()=>{ if(broadcastHoldTimer){ clearTimeout(broadcastHoldTimer); broadcastHoldTimer=0; } broadcastHoldStart=null; };
    window.addEventListener('pointerdown',(e)=>{ if(!getBroadcastConfig().enabled) return; broadcastHoldStart={x:e.clientX,y:e.clientY}; clearTimeout(broadcastHoldTimer); broadcastHoldTimer=setTimeout(()=>{ exitBroadcastMode(); clearBroadcastHold(); },1100); },true);
    window.addEventListener('pointermove',(e)=>{ if(!broadcastHoldStart) return; if(Math.hypot(e.clientX-broadcastHoldStart.x,e.clientY-broadcastHoldStart.y)>18) clearBroadcastHold(); },true);
    window.addEventListener('pointerup',clearBroadcastHold,true);
    window.addEventListener('pointercancel',clearBroadcastHold,true);
    window.addEventListener('popstate',()=>{ if(getBroadcastConfig().enabled) exitBroadcastMode(); });
    window.addEventListener('keydown',(e)=>{ if(e.key==='Escape'&&getBroadcastConfig().enabled) exitBroadcastMode(); }); window.addEventListener('resize',()=>{ if(state.pkg) applyCurrentLayout(); }); if(navigator.mediaDevices&&navigator.mediaDevices.addEventListener){ navigator.mediaDevices.addEventListener('devicechange',()=>{ refreshMocapCameraDevices({silent:true}).then(()=>{ if(activeMenu&&activeMenu()==='mocap') renderControls(); }); }); } window.addEventListener('pagehide',()=>{ stopFaceCaptureCamera().catch(()=>{}); }); }
  try{ bind(); renderControls(); updateModeButtons(); window.BEGA={APP,state,loadPackage,fitView,resizePixiToStage,applyBroadcastLayout,applyCurrentLayout,setBroadcastEnabled,setBroadcastToolsOpen,toggleBroadcastTools,exitBroadcastMode,applyPose,setRenderMode,startRuntimeLoop,collectBegaInternalAudit,formatBegaAuditText,BEGA_PERF_GATE,startFaceCaptureCamera,stopFaceCaptureCamera,refreshMocapCameraDevices,startFaceCaptureCalibration,storeFaceCaptureTarget,updateRuntimeFromMocapTarget,filterFaceCaptureTargetAntiTick,resetHeadAntiTickRuntime,filterPoseTargetBodyAntiTick,resetBodyAntiTickRuntime,resetBodyFinalFollowRuntime,applyBodyFinalFollowFromTarget,resetArmAntiTickRuntime,reseedArmAntiTickFromCurrent,storePoseCaptureTarget,updateRuntimeFromPoseTarget}; }catch(err){ console.error('[BEGA boot failed]',err); try{ setHud('ERROR: boot failed'); showPanel(`<div class="card"><h2 class="title bad">BEGA 초기화 실패</h2><div class="mono bad">${escapeHtml(err&&err.message?err.message:String(err))}</div></div>`); }catch(_){} }
