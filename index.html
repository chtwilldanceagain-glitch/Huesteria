velocityDeadzone: ${fmt(st.velocityDeadzone,3)}
accelDeadzone: ${fmt(st.accelDeadzone,3)}
warmupMs: ${fmt(st.warmupMs,0)}</div></div><div class="card"><h3 class="title">안정화</h3>${createPhysicsRange('입력 무시','inputDeadzone',0,0.5,0.001)}${createPhysicsRange('속도 무시','velocityDeadzone',0,1,0.001)}${createPhysicsRange('가속 무시','accelDeadzone',0,1,0.001)}${createPhysicsRange('초기 안정화','warmupMs',0,3000,50)}</div>`; }
  function createBroadcastNumber(label,key,min,max,step=1){ const b=getBroadcastConfig(); const value=fmt(b[key],0); return `<div class="rangeRow"><label>${escapeHtml(label)}</label><input type="range" data-broadcast-key="${escapeHtml(key)}" min="${min}" max="${max}" step="${step}" value="${value}"><input type="number" data-broadcast-key="${escapeHtml(key)}" min="${min}" max="${max}" step="${step}" value="${value}"></div>`; }
  function renderOutputMenu(){ const b=getBroadcastConfig(); const layoutOn=isBroadcastLayoutActive(); const presetLabel=getBroadcastPresetLabel(); const bgButtons=BROADCAST_BACKGROUNDS.map((bg)=>createActionButton(broadcastBackgroundLabel(bg),'broadcastBg:'+bg,b.background===bg)).join(''); const presetButtons=Object.entries(BROADCAST_PRESETS).map(([id,p])=>createActionButton(p.label,'broadcastPreset:'+id,b.width===p.width&&b.height===p.height&&b.anchorX===p.anchorX&&b.anchorY===p.anchorY&&b.avatarHeight===p.avatarHeight)).join(''); return `<div class="card broadcastHint"><h2 class="title">송출</h2><p class="text">캐릭터 내부 런타임과 별개인 최종 배치층입니다. 노란 점선은 현재 프리셋의 실제 송출 영역이고, 우하단 점이 캐릭터 anchor입니다.</p><div class="mono ok">현재 프리셋: ${escapeHtml(presetLabel)}</div><div class="row">${presetButtons}</div></div><div class="card"><h3 class="title">송출 좌표</h3>${createBroadcastNumber('화면 W','width',320,7680,1)}${createBroadcastNumber('화면 H','height',240,4320,1)}${createBroadcastNumber('기준 X','anchorX',-7680,15360,1)}${createBroadcastNumber('기준 Y','anchorY',-4320,8640,1)}${createBroadcastNumber('캐릭터 높이','avatarHeight',16,4320,1)}<div class="mono ${layoutOn?'ok':'bad'}">anchor: 캐릭터 고정 박스의 우측 하단
preset: ${escapeHtml(presetLabel)}
layout: ${layoutOn?'broadcast':'fit'}
guide: ${b.guide?'on':'off'}
background: ${broadcastBackgroundLabel(b.background)}
stageScale: ${fmt(state.view.scale,4)}
stagePos: ${fmt(state.view.x,1)}, ${fmt(state.view.y,1)}</div></div><div class="card"><h3 class="title">배경 / 실행</h3><div class="row">${bgButtons}</div><div class="row">${createActionButton('배치 미리보기','broadcastPreview',b.preview)}${createActionButton('프리셋 영역','broadcastGuide',b.guide)}${createActionButton('검수 화면맞춤','broadcastPreviewOff',!b.preview&&!b.enabled)}${createActionButton(b.enabled?'송출모드 OFF':'송출모드 ON','broadcastToggle',b.enabled)}${createActionButton('전체화면','fullscreen')}</div><p class="text">프리셋 영역 가이드는 배치 미리보기에서만 보입니다. 송출모드 ON에서는 실제 방송에 찍히지 않도록 자동 숨김 처리합니다.</p></div><div class="card"><div class="mono ok">canvas: ${state.pkg&&state.pkg.canvas&&state.pkg.canvas.width||0} × ${state.pkg&&state.pkg.canvas&&state.pkg.canvas.height||0}
layers: ${state.items.size}
renderMode: ${escapeHtml(state.renderMode)}</div></div>`; }
  function renderInfoMenu(){ const auditText=state.pkg?formatBegaAuditText():'패키지 없음'; const hasFail=state.audit&&(state.audit.issues||[]).some((x)=>x.level==='fail'); return `<div class="card"><h2 class="title">정보</h2><div class="mono ok">${escapeHtml(getPackageInfoText())}</div></div><div class="card"><h3 class="title">로드 검수</h3><div class="mono ${hasFail?'bad':'ok'}">${escapeHtml(auditText)}</div></div><div class="card"><p class="text">ZIP 구조: manifest.json + layers/*.png. 흰 덩어리가 나오면 먼저 ZIP을 풀어 layers PNG 색을 확인합니다.</p></div>${firstLayerPreviewHtml()}`; }
  function bindPanelControls(){ $('panel').querySelectorAll('input[data-key]').forEach((el)=>{ el.addEventListener('input',()=>{ const key=el.dataset.key; const min=Number(el.dataset.min??-1); const max=Number(el.dataset.max??1); state.runtime[key]=clamp(el.value,min,max,0); $('panel').querySelectorAll(`input[data-key="${key}"]`).forEach((other)=>{ if(other!==el) other.value=el.type==='range'?fmt(state.runtime[key],2):state.runtime[key]; }); applyPose(); startRuntimeLoop(); }); }); $('panel').querySelectorAll('input[data-phys-key]').forEach((el)=>{ el.addEventListener('input',()=>{ const key=el.dataset.physKey; const min=Number(el.dataset.min??0); const max=Number(el.dataset.max??1); const st=getPhysicsStabilize(); st[key]=clamp(el.value,min,max,0); $('panel').querySelectorAll(`input[data-phys-key="${key}"]`).forEach((other)=>{ if(other!==el) other.value=key==='warmupMs'?fmt(st[key],0):fmt(st[key],3); }); resetPhysicsRuntime({keepWarmup:true,lastAt:performance.now()}); applyPose(); startRuntimeLoop(); }); }); $('panel').querySelectorAll('input[data-cap-key]').forEach((el)=>{ el.addEventListener('input',()=>{ const key=el.dataset.capKey; const min=Number(el.dataset.min??0); const max=Number(el.dataset.max??3); const cfg=getCaptureFaceConfig(); cfg[key]=clamp(el.value,min,max,BEGA_DEFAULT_CAPTURE_FACE[key]||0); $('panel').querySelectorAll(`input[data-cap-key="${key}"]`).forEach((other)=>{ if(other!==el) other.value=fmt(cfg[key],(key==='deadzone'||key==='headDeadzone'||key==='headMaxStep')?3:2); }); }); }); $('panel').querySelectorAll('input[data-broadcast-key]').forEach((el)=>{ el.addEventListener('input',()=>{ const key=el.dataset.broadcastKey; const b=getBroadcastConfig(); const min=Number(el.dataset.min??-999999); const max=Number(el.dataset.max??999999); b[key]=Math.round(clamp(el.value,min,max,b[key]||0)); $('panel').querySelectorAll(`input[data-broadcast-key="${key}"]`).forEach((other)=>{ if(other!==el) other.value=fmt(b[key],0); }); if(isBroadcastLayoutActive()) applyBroadcastLayout(); }); }); $('panel').querySelectorAll('button[data-action]').forEach((btn)=>{ btn.addEventListener('click',()=>{ const action=btn.dataset.action; if(action==='load') $('packageInput').click(); else if(action==='fit'){ const b=getBroadcastConfig(); b.enabled=false; b.preview=false; applyCurrentLayout(); renderControls(); } else if(action==='reset') resetPose(); else if(action==='sprite') setRenderMode('sprite'); else if(action==='mesh') setRenderMode('mesh'); else if(action==='togglePhysics'){ normalizePhysicsPackage(state.pkg); state.pkg.physics.enabled=!state.pkg.physics.enabled; resetPhysicsRuntime({lastAt:0}); renderControls(); applyPose(); startRuntimeLoop(); } else if(action==='toggleBlink'){ state.runtime.blinkEnabledOverride=!isBlinkActive(); state.runtime.faceTick.blinkNextAt=0; state.runtime.faceTick.blinking=false; renderControls(); applyPose(); startRuntimeLoop(); } else if(action==='toggleBreath'){ state.runtime.breathEnabledOverride=!isBreathActive(); state.runtime.faceTick.breathStartAt=0; renderControls(); applyPose(); startRuntimeLoop(); } else if(action==='mocapStart'){ startFaceCaptureCamera(); } else if(action==='mocapStop'){ stopFaceCaptureCamera(); } else if(action==='mocapCalibrate'){ startFaceCaptureCalibration('수동 보정'); renderControls(); } else if(action==='mocapMirror'){ const cfg=getCaptureFaceConfig(); cfg.mirror=!cfg.mirror; updateMpPreviewState(getMocapRuntime().ready); renderControls(); } else if(action==='mocapPreview'){ const cfg=getCaptureFaceConfig(); cfg.overlayEnabled=!cfg.overlayEnabled; updateMpPreviewState(getMocapRuntime().ready); renderControls(); } else if(action==='broadcastPreview'){ setBroadcastPreview(true); } else if(action==='broadcastGuide'){ setBroadcastGuide(!getBroadcastConfig().guide); } else if(action==='broadcastPreviewOff'){ const b=getBroadcastConfig(); b.enabled=false; setBroadcastPreview(false); } else if(action==='broadcastToggle'){ setBroadcastEnabled(!getBroadcastConfig().enabled); } else if(action&&action.startsWith('broadcastPreset:')){ setBroadcastPreset(action.split(':')[1]); } else if(action&&action.startsWith('broadcastBg:')){ setBroadcastBackground(action.split(':')[1]); } else if(action==='fullscreen'){ const shell=$('stageShell'); if(shell&&shell.requestFullscreen) shell.requestFullscreen().catch(()=>{}); } }); }); }
  function renderControls(){ const pkg=state.pkg; if(!pkg){ const active=activeMenu(); showPanel(`<div class="card"><h2 class="title">BEGA</h2><p class="text">SIRIOUS 출력 탭에서 만든 BEGA ZIP 패키지(.zip)를 불러오세요. 구버전 JSON도 읽을 수 있습니다.</p><div class="row">${createActionButton('패키지 불러오기','load',true)}</div></div>${active==='info'?'<div class="card"><div class="mono">패키지 없음</div></div>':''}`); bindPanelControls(); return; } let html=''; if(activeMenu()==='file') html=renderFileMenu(); else if(activeMenu()==='face') html=renderFaceMenu(); else if(activeMenu()==='physics') html=renderPhysicsMenu(); else if(activeMenu()==='mocap') html=renderMocapMenu(); else if(activeMenu()==='output') html=renderOutputMenu(); else html=renderInfoMenu(); showPanel(html); bindPanelControls(); }
  async function setRenderMode(mode){ if(mode!== 'sprite' && mode!=='mesh') return; if(state.renderMode===mode) return; state.renderMode=mode; if(state.pkg){ await rebuildStage(); renderControls(); applyCurrentLayout(); applyPose(); } updateModeButtons(); }
  function updateModeButtons(){ const sprite=$('modeSpriteBtn'); const mesh=$('modeMeshBtn'); if(sprite) sprite.setAttribute('aria-pressed',state.renderMode==='sprite'?'true':'false'); if(mesh) mesh.setAttribute('aria-pressed',state.renderMode==='mesh'?'true':'false'); const pairs=[['menuFileBtn','file'],['menuFaceBtn','face'],['menuPhysicsBtn','physics'],['menuMocapBtn','mocap'],['menuOutputBtn','output'],['menuInfoBtn','info']]; for(const [id,menu] of pairs){ const btn=$(id); if(btn) btn.setAttribute('aria-pressed',activeMenu()===menu?'true':'false'); } }
  function resetPose(){ state.runtime.headYaw=0; state.runtime.headPitch=0; state.runtime.headRoll=0; state.runtime.gazeX=0; state.runtime.gazeY=0; state.runtime.mouthOpen=0; state.runtime.mouthForm=0; state.runtime.mouthState='close'; resetPhysicsRuntime({lastAt:0}); renderControls(); applyPose(); startRuntimeLoop(); }
  function setupStageGestures(){ const shell=$('stageShell'); const pointers=new Map(); const locked=()=>getBroadcastConfig().enabled===true; shell.addEventListener('pointerdown',(e)=>{ if(locked()){ pointers.clear(); return; } shell.setPointerCapture(e.pointerId); pointers.set(e.pointerId,{x:e.clientX,y:e.clientY}); }); shell.addEventListener('pointermove',(e)=>{ if(locked()){ pointers.clear(); return; } if(!pointers.has(e.pointerId)||!state.app) return; const prev=pointers.get(e.pointerId); const dx=e.clientX-prev.x; const dy=e.clientY-prev.y; pointers.set(e.pointerId,{x:e.clientX,y:e.clientY}); state.view.x+=dx; state.view.y+=dy; state.app.stage.position.set(state.view.x,state.view.y); }); const end=(e)=>pointers.delete(e.pointerId); shell.addEventListener('pointerup',end); shell.addEventListener('pointercancel',end); shell.addEventListener('wheel',(e)=>{ if(locked()){ e.preventDefault(); return; } e.preventDefault(); if(!state.app) return; const next=clamp(state.view.scale*(e.deltaY<0?1.08:0.92),0.02,10,state.view.scale); state.view.scale=next; state.app.stage.scale.set(next); },{passive:false}); }
  function bind(){ const input=$('packageInput'); $('loadBtn').addEventListener('click',()=>{ input.value=''; input.click(); }); input.addEventListener('change',()=>{ const file=input.files&&input.files[0]; if(!file) return; loadPackage(file).catch((err)=>{ console.error(err); setHud(`ERROR: ${err.message}`); showPanel(`<div class="card"><h2 class="title bad">로드 실패</h2><div class="mono bad">${escapeHtml(err.message||String(err))}</div></div>`); }); }); $('fitBtn').addEventListener('click',()=>{ const b=getBroadcastConfig(); b.enabled=false; b.preview=false; applyCurrentLayout(); renderControls(); }); $('modeSpriteBtn').addEventListener('click',()=>setRenderMode('sprite')); $('modeMeshBtn').addEventListener('click',()=>setRenderMode('mesh')); const menus=[['menuFileBtn','file'],['menuFaceBtn','face'],['menuPhysicsBtn','physics'],['menuMocapBtn','mocap'],['menuOutputBtn','output'],['menuInfoBtn','info']]; for(const [id,menu] of menus){ const btn=$(id); if(btn) btn.addEventListener('click',()=>setActiveMenu(menu)); } const exitBtn=$('broadcastExitBtn'); if(exitBtn){ const exit=(e)=>{ e.preventDefault(); e.stopPropagation(); exitBroadcastMode(); }; exitBtn.addEventListener('click',exit); exitBtn.addEventListener('pointerup',exit); }
    let broadcastHoldTimer=0; let broadcastHoldStart=null;
    const clearBroadcastHold=()=>{ if(broadcastHoldTimer){ clearTimeout(broadcastHoldTimer); broadcastHoldTimer=0; } broadcastHoldStart=null; };
    window.addEventListener('pointerdown',(e)=>{ if(!getBroadcastConfig().enabled) return; broadcastHoldStart={x:e.clientX,y:e.clientY}; clearTimeout(broadcastHoldTimer); broadcastHoldTimer=setTimeout(()=>{ exitBroadcastMode(); clearBroadcastHold(); },1100); },true);
    window.addEventListener('pointermove',(e)=>{ if(!broadcastHoldStart) return; if(Math.hypot(e.clientX-broadcastHoldStart.x,e.clientY-broadcastHoldStart.y)>18) clearBroadcastHold(); },true);
    window.addEventListener('pointerup',clearBroadcastHold,true);
    window.addEventListener('pointercancel',clearBroadcastHold,true);
    window.addEventListener('popstate',()=>{ if(getBroadcastConfig().enabled) exitBroadcastMode(); });
    window.addEventListener('keydown',(e)=>{ if(e.key==='Escape'&&getBroadcastConfig().enabled) exitBroadcastMode(); }); window.addEventListener('resize',()=>{ if(state.pkg) applyCurrentLayout(); }); window.addEventListener('pagehide',()=>{ stopFaceCaptureCamera().catch(()=>{}); }); }
  try{ bind(); renderControls(); updateModeButtons(); window.BEGA={APP,state,loadPackage,fitView,resizePixiToStage,applyBroadcastLayout,applyCurrentLayout,setBroadcastEnabled,exitBroadcastMode,applyPose,setRenderMode,startRuntimeLoop,collectBegaInternalAudit,formatBegaAuditText,startFaceCaptureCamera,stopFaceCaptureCamera,startFaceCaptureCalibration}; }catch(err){ console.error('[BEGA boot failed]',err); try{ setHud('ERROR: boot failed'); showPanel(`<div class="card"><h2 class="title bad">BEGA 초기화 실패</h2><div class="mono bad">${escapeHtml(err&&err.message?err.message:String(err))}</div></div>`); }catch(_){} }
})();
